<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盛欣格 — 全媒体设计师 · AI创作者</title>
  <style>
    /* ============================
       基础重置 + CSS 变量
       ============================ */
    :root {
      --cream: #f5f0e8;       /* 米白底色 */
      --white: #ffffff;
      --dark: #2d3436;        /* 深灰文字 */
      --gray: #636e72;        /* 次级灰色 */
      --orange: #e17055;      /* 橘红点缀 */
      --yellow: #fdcb6e;      /* 黄色点缀 */
      --green: #00b894;       /* 绿色点缀 */
      --blue: #0984e3;        /* 蓝色点缀 */
      --purple: #6c5ce7;      /* 紫色点缀 */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--white);
      color: var(--dark);
      line-height: 1.6;
    }

    /* 顶部彩虹条 */
    .top-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--yellow), var(--green), var(--blue), var(--purple));
    }

    /* 底部彩虹条 */
    .bottom-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--yellow), var(--green), var(--blue), var(--purple));
    }

    /* 内容容器 —— 手机端满宽，大屏居中 */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <!-- 顶部彩虹条 -->
  <div class="top-stripe"></div>

  <!-- 所有板块内容将在此处添加 -->

  <!-- 底部彩虹条 -->
  <div class="bottom-stripe"></div>

</body>
</html>
