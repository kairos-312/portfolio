<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hook Lab - 爆款开头生成器</title>
<style>
/* ===== 全局基础 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #fafaf9;
  color: #1a1a1a;
  line-height: 1.6;
  min-height: 100vh;
}
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== 头部 ===== */
.header {
  text-align: center;
  padding: 48px 0 32px;
}
.header .logo {
  font-size: 28px;
  font-weight: 800;
  color: #1a1a1a;
  letter-spacing: -0.5px;
}
.header .subtitle {
  font-size: 14px;
  color: #999;
  margin-top: 6px;
}

/* ===== 输入卡片 ===== */
.input-card {
  background: #fff;
  border: 1px solid #e8e6e3;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}
.input-card .label {
  font-size: 13px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
}
.input-card input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e8e6e3;
  border-radius: 10px;
  background: #fafaf9;
  font-size: 15px;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.2s;
}
.input-card input[type="text"]:focus {
  border-color: #f97316;
  background: #fff;
}
.input-card input[type="text"]::placeholder {
  color: #c0c0c0;
}

/* ===== 药丸选择按钮 ===== */
.pill-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.pill {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid #e8e6e3;
  background: #f5f5f4;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.pill:hover { background: #ededec; }
.pill.active {
  background: #f97316;
  border-color: #f97316;
  color: #fff;
}

/* 内容类型的 active 用黑色，和平台区分 */
#typeGroup .pill.active {
  background: #1a1a1a;
  border-color: #1a1a1a;
  color: #fff;
}

/* ===== 生成按钮 ===== */
.btn-generate {
  width: 100%;
  padding: 14px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-generate:hover { opacity: 0.92; transform: translateY(-1px); }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ===== Tab 栏 ===== */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid #e8e6e3;
  margin-bottom: 16px;
}
.tab {
  padding: 10px 18px;
  font-size: 14px;
  color: #999;
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  transition: all 0.2s;
  font-family: inherit;
}
.tab:hover { color: #555; }
.tab.active {
  color: #1a1a1a;
  font-weight: 600;
  border-bottom-color: #f97316;
}

/* ===== Hook 卡片 ===== */
.hook-card {
  background: #fff;
  border: 1px solid #e8e6e3;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
}
.hook-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.hook-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.hook-card .style-tag {
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}
.hook-card .score {
  font-weight: 800;
  font-size: 16px;
}
.hook-card .hook-text {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.7;
  margin-bottom: 8px;
}
.hook-card .hook-reason {
  font-size: 13px;
  color: #888;
  line-height: 1.5;
}
.hook-card .card-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}
.card-actions button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  padding: 2px 4px;
  transition: transform 0.15s;
  line-height: 1;
}
.card-actions button:active { transform: scale(0.9); }

/* ===== 动画 ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.hook-card { animation: fadeInUp 0.4s ease forwards; }

@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 800px 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 14px;
  height: 110px;
  margin-bottom: 12px;
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #bbb;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; margin-bottom: 16px; color: #aaa; }
.quick-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.quick-topic {
  padding: 6px 14px;
  background: #f5f5f4;
  border: 1px solid #e8e6e3;
  border-radius: 20px;
  font-size: 13px;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-topic:hover {
  background: #fff;
  color: #f97316;
  border-color: #f97316;
}

/* ===== 历史列表项 ===== */
.history-item {
  background: #fff;
  border: 1px solid #e8e6e3;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.history-item:hover {
  border-color: #f97316;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.history-item .history-meta {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 32px 0;
  color: #ccc;
  font-size: 12px;
  border-top: 1px solid #e8e6e3;
  margin-top: 32px;
}

/* ===== 响应式：手机 ===== */
@media (max-width: 480px) {
  .header { padding: 32px 0 20px; }
  .header .logo { font-size: 24px; }
  .input-card { padding: 16px; }
  .pill-group { gap: 6px; }
  .pill { padding: 6px 12px; font-size: 13px; }
  .tab { padding: 10px 12px; font-size: 13px; }
  .hook-card { padding: 14px; }
  .hook-card .hook-text { font-size: 14px; }
  .hook-card .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .hook-card .card-header .card-actions { align-self: flex-end; }
}
</style>
</head>

    '微型叙事自带悬念和代入感，"{start}到{end}"制造成长弧线，用户想看结局',
    '故事是人类最原始的注意力捕获器，比任何技巧都更自然有效',
  ],
  urgency: [
    '时间压力促使用户立即行动，"只有最后{num}个月"制造稀缺感，适合产品推广',
    'FOMO（错失恐惧）心理触发即时的点击欲望，是转化率最高的开头类型之一',
  ],
};

// ===== 工具函数 =====
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// 从 STYLES 数组中按 id 查找（不用 Array.find，确保老浏览器兼容）
function findStyle(id) {
  for (var i = 0; i < STYLES.length; i++) {
    if (STYLES[i].id === id) return STYLES[i];
  }
  return null;
}

// 从数组中按 id 查找 hook
function findHookById(arr, id) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].id === id) return arr[i];
  }
  return null;
}

// 从数组中按 id 查找索引
function findIndexById(arr, id) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].id === id) return i;
  }
  return -1;
}

// 检查收藏中是否已有某 hook
function isFaved(hookId) {
  for (var i = 0; i < favorites.length; i++) {
    if (favorites[i].id === hookId) return true;
  }
  return false;
}

// 按 id 查找历史记录
function findHistoryById(id) {
  for (var i = 0; i < genHistory.length; i++) {
    if (genHistory[i].id === id) return genHistory[i];
  }
  return null;
}

// 浅拷贝 hook 对象
function cloneHook(h) {
  return {
    id: h.id,
    hook: h.hook,
    style: h.style,
    styleIcon: h.styleIcon,
    styleColor: h.styleColor,
    styleBg: h.styleBg,
    score: h.score,
    reason: h.reason,
  };
}

// ===== 核心：生成 Hook 列表 =====
function generateHooks(topic, platform, contentType) {
  var tone = PLATFORM_TONE[platform];
  var styleOrder = TYPE_STYLE_MAP[contentType];
  var hooks = [];
  // 风格加分表，10 个位置
  var styleBonusList = [0, 2, 4, 6, 8, 10, 12, 13, 14, 15];

  for (var i = 0; i < 10; i++) {
    // 前 8 个用排列好的风格，后 2 个复用前两个热门风格但换不同模板
    var styleId;
    if (i < 8) {
      styleId = styleOrder[i];
    } else {
      // 复用争议型和数据型，二次生成不同句式
      styleId = i === 8 ? styleOrder[0] : styleOrder[1];
    }

    var style = findStyle(styleId);

    // 后 2 个排除已用过的模板，确保不重复
    var template;
    if (i < 8) {
      template = randomPick(style.templates);
    } else {
      // 从该风格模板中随机选（可能和前面重复，但文案变量不同）
      var idx = (i - 7) % style.templates.length;
      template = style.templates[idx];
    }

    // 准备模板变量
    var vars = {
      topic: topic,
      time: randomPick(tone.time),
      effort: randomPick(tone.effort),
      counter: randomPick(tone.counter),
      expert: randomPick(tone.expert),
      start: randomPick(tone.start),
      end: randomPick(tone.end),
      danger: randomPick(tone.danger),
      field: randomPick(tone.field),
      amount: randomPick(tone.amount),
      budget: randomPick(tone.budget),
      num: randomPick(tone.num),
      small: randomPick(tone.small),
      rank: randomPick(tone.rank),
      unit: randomPick(tone.unit),
      percent: randomPick(tone.percent),
    };

    // 填充模板
    var hookText = template.replace(/\{(\w+)\}/g, function(_, key) {
      return vars[key] || '{' + key + '}';
    });

    // 点击率：靠前的风格基础分更高（模拟不同风格的吸引力差异）
    var baseScore = 80;
    var styleBonus = styleBonusList[i];
    var noise = Math.floor(Math.random() * 4) - 1;
    var score = Math.min(98, Math.max(78, baseScore + styleBonus + noise));

    // 推荐理由
    var reasonTemplate = randomPick(REASONS[styleId]);
    var reason = reasonTemplate.replace(/\{(\w+)\}/g, function(_, key) {
      return vars[key] || '{' + key + '}';
    });

    hooks.push({
      id: Date.now() + '_' + i,
      hook: hookText,
      style: style.name,
      styleIcon: style.icon,
      styleColor: style.color,
      styleBg: style.bg,
      score: score,
      reason: reason,
    });
  }

  return hooks;
}

// DOM 引用
var topicInput = document.getElementById('topicInput');
var btnGenerate = document.getElementById('btnGenerate');
var resultsPanel = document.getElementById('resultsPanel');
var favoritesPanel = document.getElementById('favoritesPanel');
var historyPanel = document.getElementById('historyPanel');
var favCountEl = document.getElementById('favCount');

// 状态
var currentPlatform = 'xiaohongshu';
var currentType = 'video';
var currentTab = 'results';
var currentHooks = [];
var favorites = JSON.parse(localStorage.getItem('hooklab_favorites') || '[]');
var genHistory = JSON.parse(localStorage.getItem('hooklab_history') || '[]');

// 平台名称映射
var PLATFORM_NAMES = { xiaohongshu: '小红书', douyin: '抖音', bilibili: 'B站' };
var TYPE_NAMES = { video: '视频', 'image-text': '图文', product: '产品广告', tutorial: '教程', opinion: '观点帖' };

// ===== 平台选择 =====
document.getElementById('platformGroup').addEventListener('click', function(e) {
  if (e.target.classList.contains('pill')) {
    e.target.parentElement.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    e.target.classList.add('active');
    currentPlatform = e.target.dataset.value;
  }
});

// ===== 内容类型选择 =====
document.getElementById('typeGroup').addEventListener('click', function(e) {
  if (e.target.classList.contains('pill')) {
    e.target.parentElement.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    e.target.classList.add('active');
    currentType = e.target.dataset.value;
  }
});

// ===== Tab 切换 =====
document.querySelector('.tabs').addEventListener('click', function(e) {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    e.target.classList.add('active');
    currentTab = e.target.dataset.tab;

    resultsPanel.style.display = currentTab === 'results' ? 'block' : 'none';
    favoritesPanel.style.display = currentTab === 'favorites' ? 'block' : 'none';
    historyPanel.style.display = currentTab === 'history' ? 'block' : 'none';

    if (currentTab === 'favorites') renderFavorites();
    if (currentTab === 'history') renderHistory();
  }
});

// ===== HTML 转义，防止 XSS =====
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 事件委托：处理卡片上的复制和收藏按钮点击
// 用最基础的 DOM 遍历，兼容所有浏览器
document.addEventListener('click', function(e) {
  var btn = e.target;
  while (btn && !btn.hasAttribute('data-action')) {
    btn = btn.parentElement;
  }
  if (!btn) return;

  if (btn.dataset.action === 'copy') {
    var text = btn.dataset.hookText;
    copyHook(text, btn);
  }

  if (btn.dataset.action === 'fav') {
    var hookId = btn.dataset.hookId;
    toggleFav(hookId, btn);
  }
});

// ===== 空状态（首次打开） =====
function renderEmptyState() {
  resultsPanel.innerHTML = ''
    + '<div class="empty-state">'
    + '  <div class="empty-icon">💡</div>'
    + '  <p>输入主题，选择平台和类型，一键生成爆款开头</p>'
    + '  <div class="quick-topics">'
    + '    <span class="quick-topic" onclick="quickFill(\'夏日护肤\')">夏日护肤</span>'
    + '    <span class="quick-topic" onclick="quickFill(\'AI赚钱\')">AI赚钱</span>'
    + '    <span class="quick-topic" onclick="quickFill(\'考研经验\')">考研经验</span>'
    + '    <span class="quick-topic" onclick="quickFill(\'租房避坑\')">租房避坑</span>'
    + '    <span class="quick-topic" onclick="quickFill(\'效率提升\')">效率提升</span>'
    + '    <span class="quick-topic" onclick="quickFill(\'面试技巧\')">面试技巧</span>'
    + '  </div>'
    + '</div>';
}

// 快速填入主题
function quickFill(topic) {
  topicInput.value = topic;
  topicInput.focus();
  document.querySelector('.input-card').scrollIntoView({ behavior: 'smooth' });
}

// ===== 骨架屏 =====
function renderSkeletons() {
  var html = '';
  for (var i = 0; i < 8; i++) {
    html += '<div class="skeleton"></div>';
  }
  resultsPanel.innerHTML = html;
}

// ===== 渲染 Hook 卡片列表 =====
function renderHooks(hooks) {
  var html = '';
  hooks.forEach(function(h, i) {
    var faved = isFaved(h.id);
    html += ''
      + '<div class="hook-card" style="border-left: 4px solid ' + h.styleColor + '; animation-delay: ' + (i * 0.05) + 's;">'
      + '  <div class="card-header">'
      + '    <span class="style-tag" style="background: ' + h.styleBg + '; color: ' + h.styleColor + ';">' + h.styleIcon + ' ' + h.style + '</span>'
      + '    <div class="card-actions">'
      + '      <span class="score" style="color: ' + (h.score >= 90 ? '#22c55e' : h.score >= 85 ? '#3b82f6' : '#888') + ';">' + h.score + '%</span>'
      + '      <button data-action="copy" data-hook-text="' + escapeHtml(h.hook) + '" title="复制">📋</button>'
      + '      <button data-action="fav" data-hook-id="' + h.id + '" title="' + (faved ? '取消收藏' : '收藏') + '">' + (faved ? '❤️' : '🤍') + '</button>'
      + '    </div>'
      + '  </div>'
      + '  <div class="hook-text">"' + escapeHtml(h.hook) + '"</div>'
      + '  <div class="hook-reason">💡 ' + escapeHtml(h.reason) + '</div>'
      + '</div>';
  });
  resultsPanel.innerHTML = html;
  currentHooks = hooks;
}

// ===== 复制到剪贴板 =====
function copyHook(hookText, btn) {
  navigator.clipboard.writeText(hookText).then(function() {
    btn.textContent = '✅';
    setTimeout(function() { btn.textContent = '📋'; }, 1500);
  }).catch(function() {
    // 降级方案：使用传统方法
    var ta = document.createElement('textarea');
    ta.value = hookText;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅';
    setTimeout(function() { btn.textContent = '📋'; }, 1500);
  });
}

// ===== 收藏 / 取消收藏 =====
function toggleFav(hookId, btn) {
  // 先在当前页面的 hooks 中查找
  var hook = findHookById(currentHooks, hookId);

  // 如果当前页面没有（收藏页删除场景），从 favorites 中查找
  if (!hook) {
    var idx = findIndexById(favorites, hookId);
    if (idx > -1) {
      favorites.splice(idx, 1);
      saveFavorites();
      updateFavCount();
      renderFavorites();
    }
    return;
  }

  var index = findIndexById(favorites, hookId);
  if (index > -1) {
    // 已收藏 → 取消
    favorites.splice(index, 1);
    if (btn) btn.textContent = '🤍';
  } else {
    // 未收藏 → 收藏
    favorites.push({
      id: hook.id,
      hook: hook.hook,
      style: hook.style,
      styleIcon: hook.styleIcon,
      styleColor: hook.styleColor,
      styleBg: hook.styleBg,
      score: hook.score,
      reason: hook.reason,
      savedAt: Date.now()
    });
    if (btn) btn.textContent = '❤️';
  }
  saveFavorites();
  updateFavCount();
}

function saveFavorites() {
  localStorage.setItem('hooklab_favorites', JSON.stringify(favorites));
}

function updateFavCount() {
  favCountEl.textContent = favorites.length;
  favCountEl.style.color = favorites.length > 0 ? '#f97316' : '#ccc';
}

// ===== 渲染收藏夹 =====
function renderFavorites() {
  if (favorites.length === 0) {
    favoritesPanel.innerHTML = ''
      + '<div class="empty-state">'
      + '  <div class="empty-icon">🤍</div>'
      + '  <p>还没有收藏哦，去生成结果页点击 🤍 收藏吧</p>'
      + '</div>';
    return;
  }

  currentHooks = favorites;
  var html = '';
  favorites.forEach(function(h, i) {
    html += ''
      + '<div class="hook-card" style="border-left: 4px solid ' + h.styleColor + ';">'
      + '  <div class="card-header">'
      + '    <span class="style-tag" style="background: ' + h.styleBg + '; color: ' + h.styleColor + ';">' + h.styleIcon + ' ' + h.style + '</span>'
      + '    <div class="card-actions">'
      + '      <span class="score" style="color: ' + (h.score >= 90 ? '#22c55e' : h.score >= 85 ? '#3b82f6' : '#888') + ';">' + h.score + '%</span>'
      + '      <button data-action="copy" data-hook-text="' + escapeHtml(h.hook) + '" title="复制">📋</button>'
      + '      <button data-action="fav" data-hook-id="' + h.id + '" title="取消收藏">❤️</button>'
      + '    </div>'
      + '  </div>'
      + '  <div class="hook-text">"' + escapeHtml(h.hook) + '"</div>'
      + '  <div class="hook-reason">💡 ' + escapeHtml(h.reason) + '</div>'
      + '</div>';
  });
  favoritesPanel.innerHTML = html;
}

// ===== 历史记录 =====
function saveHistory(topic, platform, contentType, hooks) {
  var record = {
    id: Date.now(),
    topic: topic,
    platform: platform,
    contentType: contentType,
    hooks: hooks.map(function(h) { return cloneHook(h); }),
    createdAt: new Date().toLocaleString('zh-CN'),
  };
  genHistory.unshift(record);
  if (genHistory.length > 20) genHistory = genHistory.slice(0, 20);
  localStorage.setItem('hooklab_history', JSON.stringify(genHistory));
}

function renderHistory() {
  if (genHistory.length === 0) {
    historyPanel.innerHTML = ''
      + '<div class="empty-state">'
      + '  <div class="empty-icon">📜</div>'
      + '  <p>还没有生成记录，输入主题开始吧</p>'
      + '</div>';
    return;
  }

  var html = '';
  genHistory.forEach(function(record) {
    html += ''
      + '<div class="history-item" onclick="loadHistory(' + record.id + ')">'
      + '  <div style="font-weight:600;color:#1a1a1a;">' + escapeHtml(record.topic) + '</div>'
      + '  <div class="history-meta">'
      + '    ' + PLATFORM_NAMES[record.platform] + ' · ' + TYPE_NAMES[record.contentType] + ' · ' + record.hooks.length + '个Hook · ' + record.createdAt
      + '  </div>'
      + '</div>';
  });
  historyPanel.innerHTML = html;
}

function loadHistory(recordId) {
  var record = findHistoryById(recordId);
  if (!record) return;

  // 恢复选择状态
  currentPlatform = record.platform;
  currentType = record.contentType;
  topicInput.value = record.topic;

  document.querySelectorAll('#platformGroup .pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.value === record.platform);
  });
  document.querySelectorAll('#typeGroup .pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.value === record.contentType);
  });

  // 切换到结果 Tab
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('[data-tab="results"]').classList.add('active');
  currentTab = 'results';
  resultsPanel.style.display = 'block';
  favoritesPanel.style.display = 'none';
  historyPanel.style.display = 'none';

  renderHooks(record.hooks);
  resultsPanel.scrollIntoView({ behavior: 'smooth' });
}

// ===== 生成按钮 =====
btnGenerate.addEventListener('click', function() {
  var topic = topicInput.value.trim();
  if (!topic) {
    topicInput.focus();
    topicInput.style.borderColor = '#ef4444';
    topicInput.style.background = '#fff';
    setTimeout(function() {
      topicInput.style.borderColor = '#e8e6e3';
      topicInput.style.background = '#fafaf9';
    }, 2000);
    return;
  }

  // 启动生成状态
  btnGenerate.disabled = true;
  btnGenerate.textContent = '⏳ 正在生成...';

  // 切换到结果 Tab
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('[data-tab="results"]').classList.add('active');
  currentTab = 'results';
  resultsPanel.style.display = 'block';
  favoritesPanel.style.display = 'none';
  historyPanel.style.display = 'none';

  renderSkeletons();
  resultsPanel.scrollIntoView({ behavior: 'smooth' });

  // 模拟 AI 思考（1.2~1.8 秒随机延迟）
  var delay = 800 + Math.random() * 500;
  setTimeout(function() {
    var hooks;
    try {
      hooks = generateHooks(topic, currentPlatform, currentType);
    } catch (err) {
      resultsPanel.innerHTML = '<div class="empty-state"><div class="empty-icon">😵</div><p>【生成步骤】' + err.message + '</p></div>';
      btnGenerate.disabled = false;
      btnGenerate.textContent = '✨ 生成10个爆款Hook';
      return;
    }
    try {
      renderHooks(hooks);
    } catch (err) {
      resultsPanel.innerHTML = '<div class="empty-state"><div class="empty-icon">😵</div><p>【渲染步骤】' + err.message + '</p></div>';
      btnGenerate.disabled = false;
      btnGenerate.textContent = '✨ 生成10个爆款Hook';
      return;
    }
    try {
      saveHistory(topic, currentPlatform, currentType, hooks);
    } catch (err) {
      resultsPanel.innerHTML = '<div class="empty-state"><div class="empty-icon">😵</div><p>【保存步骤】' + err.message + '</p></div>';
      btnGenerate.disabled = false;
      btnGenerate.textContent = '✨ 生成10个爆款Hook';
      return;
    }
    btnGenerate.disabled = false;
    btnGenerate.textContent = '✨ 生成10个爆款Hook';
  }, delay);
});

// ===== 回车触发生成 =====
topicInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    btnGenerate.click();
  }
});

// ===== 初始化 =====
renderEmptyState();
updateFavCount();
</script>
